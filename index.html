<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Помощник выбора кухни</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🍽 Интеллектуальный помощник выбора кухни</h1>

<div class="container">

    <h2>Введите параметры ресторана</h2>

    <label>Бюджет (₽):</label>
    <input type="number" id="budget">

    <label>Площадь (м²):</label>
    <input type="number" id="area">

    <label>Локация:</label>
    <select id="location">
        <option value="center">Центр города</option>
        <option value="residential">Спальный район</option>
        <option value="tourist">Туристическая зона</option>
    </select>

    <label>Целевая аудитория:</label>
    <select id="audience">
        <option value="students">Студенты</option>
        <option value="families">Семьи</option>
        <option value="office">Офисные работники</option>
        <option value="evening">Вечерняя аудитория</option>
    </select>

    <button onclick="recommend()">Получить рекомендацию</button>

    <h2>Рекомендация:</h2>
    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
